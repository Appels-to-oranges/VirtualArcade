<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texas Hold'em</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="join-screen">
    <div class="join-card">
      <h1>Texas Hold'em</h1>
      <p class="tagline">Room-based poker with friends</p>
      <div id="join-form" class="join-form">
        <div class="form-group">
          <label for="room-key">Room key</label>
          <input type="text" id="room-key" class="form-control" placeholder="Enter room key" maxlength="32" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="nickname">Nickname</label>
          <input type="text" id="nickname" class="form-control" placeholder="Enter nickname" maxlength="20" autocomplete="off">
        </div>
        <button type="button" id="join-btn" class="btn-join">Join</button>
      </div>
      <p class="hint">Share the same room key to play together.</p>
    </div>
  </div>

  <div id="game-screen" class="hidden">
    <div class="game-scale-wrapper">
    <div class="room-bar">
      <span id="room-label"></span>
      <span id="waiting-for-players" class="waiting-msg hidden"></span>
      <button id="start-btn" class="btn-start">Start Game</button>
      <button id="add-bot-btn" class="btn-add-bot hidden">Add Bot</button>
      <button id="restart-btn" class="btn-restart hidden">Next Hand</button>
      <button type="button" id="radio-btn" class="btn-radio" title="Radio" aria-label="Radio">&#x1F4FB;</button>
    </div>
    <div class="table-container">
      <div class="poker-table">
        <div class="phase-label" id="phase-label"></div>
        <div class="hand-rank-label" id="hand-rank-label"></div>
        <div class="community-area" id="community-area">
          <div class="table-pot" id="table-pot">
            <span class="table-pot-label">Pot</span>
            <span class="table-pot-amount" id="table-pot-amount">$0</span>
            <span class="table-pot-chips" id="table-pot-chips"></span>
          </div>
          <div class="board-cards" id="board-cards"></div>
          <div class="winner-notification persistent" id="winner-notification"></div>
          <div class="winning-hand-row hidden" id="winning-hand-row">
            <span class="winning-hand-label">Winning hand</span>
            <div class="winning-hand-cards" id="winning-hand-cards"></div>
          </div>
        </div>
        <div class="players-container" id="players-container"></div>
      </div>
    </div>
    <div class="controls" id="controls">
      <div class="turn-timer hidden" id="turn-timer"></div>
      <div class="pot-in-controls" id="pot-in-controls">Pot: $0</div>
      <button id="btn-fold" class="btn btn-fold">Fold</button>
      <button id="btn-check" class="btn btn-check">Check</button>
      <button id="btn-call" class="btn btn-call">Call</button>
      <div class="bet-row">
        <input type="number" id="bet-amount" placeholder="$20" min="0" value="40">
        <button id="btn-bet" class="btn btn-bet">Bet</button>
      </div>
      <button id="btn-allin" class="btn btn-allin">All In</button>
      <button id="btn-rebuy" class="btn btn-rebuy hidden">Rebuy $1000</button>
    </div>
    <div class="now-playing-radio hidden" id="now-playing-radio">
      <span class="now-playing-label" id="now-playing-radio-label"></span>
      <button type="button" class="now-playing-stop" id="radio-stop" title="Stop radio">&#x25A0;</button>
    </div>
    <div class="message-toast" id="message-toast"></div>
    </div>
    <div id="radio-overlay" class="radio-overlay hidden">
      <div class="radio-panel">
        <div class="radio-header">
          <h2>Radio</h2>
          <button type="button" class="radio-close" id="radio-close" aria-label="Close">&#xD7;</button>
        </div>
        <div class="radio-search-wrap">
          <input type="text" id="radio-search" placeholder="Search stations..." autocomplete="off">
          <button type="button" id="radio-search-btn">Search</button>
        </div>
        <div class="sound-controls">
          <div class="radio-volume-wrap">
            <label>Radio</label>
            <input type="range" id="radio-volume" min="0" max="100" value="80">
            <span id="radio-volume-value">80%</span>
          </div>
          <div class="radio-volume-wrap">
            <label>Card FX</label>
            <input type="range" id="card-fx-volume" min="0" max="100" value="80">
            <span id="card-fx-volume-value">80%</span>
          </div>
          <div class="radio-volume-wrap">
            <label>Ambience</label>
            <input type="range" id="ambience-volume" min="0" max="100" value="25">
            <span id="ambience-volume-value">25%</span>
          </div>
        </div>
        <div class="radio-results" id="radio-results"></div>
      </div>
    </div>
    <div id="showdown-overlay" class="showdown-overlay hidden">
      <div class="showdown-modal">
        <div class="showdown-winner-banner" id="showdown-winner-banner"></div>
        <h2 id="showdown-title"></h2>
        <div class="showdown-board-section">
          <div class="showdown-section-label">Board</div>
          <div class="showdown-board-cards" id="showdown-board-cards"></div>
        </div>
        <div class="showdown-winning-section">
          <div class="showdown-winning-label">Winning hand</div>
          <div class="showdown-winning-cards" id="showdown-winning-cards"></div>
        </div>
        <div class="showdown-hands-section">
          <div class="showdown-section-label">All hands</div>
          <div class="showdown-hands" id="showdown-hands"></div>
        </div>
        <button id="showdown-dismiss" class="btn-dismiss">Continue</button>
      </div>
    </div>
  </div>

  <script src="pokersolver.js"></script>
  <script src="client.js"></script>
</body>
</html>
