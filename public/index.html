<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texas Hold'em</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="join-screen">
    <div class="join-card">
      <h1>Texas Hold'em</h1>
      <p class="tagline">Room-based poker with friends</p>
      <form id="join-form">
        <input type="text" id="room-key" placeholder="Room key" maxlength="32" autocomplete="off">
        <input type="text" id="nickname" placeholder="Nickname" maxlength="20" autocomplete="off">
        <button type="submit">Join</button>
      </form>
      <p class="hint">Share the same room key to play together.</p>
    </div>
  </div>

  <div id="game-screen" class="hidden">
    <div class="table-container">
      <div class="poker-table">
        <div class="pot-display">
          <span id="pot-label">Pot: $0</span>
        </div>
        <div class="community-cards" id="community-cards"></div>
        <div class="players-container" id="players-container"></div>
        <div class="my-cards" id="my-cards"></div>
        <div class="controls" id="controls">
          <button id="btn-fold" class="btn btn-fold">Fold</button>
          <button id="btn-check" class="btn btn-check">Check</button>
          <button id="btn-call" class="btn btn-call">Call</button>
          <div class="bet-row">
            <input type="number" id="bet-amount" placeholder="Amount" min="0" value="40">
            <button id="btn-bet" class="btn btn-bet">Bet</button>
            <button id="btn-raise" class="btn btn-raise">Raise</button>
          </div>
        </div>
        <div class="phase-label" id="phase-label"></div>
        <div class="room-bar">
          <span id="room-label"></span>
          <button id="start-btn" class="btn-start">Start Game</button>
        </div>
      </div>
    </div>
    <div class="message-toast" id="message-toast"></div>
  </div>

  <script src="client.js"></script>
</body>
</html>
